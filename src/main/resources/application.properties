spring.application.name=TreeSortCode
server.port=25565
## Datasource: default to PostgreSQL via environment variables
## Use H2 in-memory for local development to avoid requiring a Postgres server here.
spring.datasource.url=jdbc:h2:mem:treesortdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# H2 console (available for dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Use non-contextual LOB creation so Hibernate avoids Postgres LargeObject API
# which requires disabling autocommit. This makes Hibernate read/write CLOBs
# using streams and works with modern Postgres drivers in containerized apps.
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


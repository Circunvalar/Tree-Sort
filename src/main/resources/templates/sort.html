<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TreeSort Visual (Final)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #020617;
            color: #e5e5e5;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        input {
            padding: 10px;
            width: 260px;
            background: #020617;
            border: 1px solid #1e293b;
            color: white;
            border-radius: 10px;
        }

        .btn {
            background: #020617;
            border: 1px solid #1e293b;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            margin: 5px;
        }

        .btn:hover {
            background: #0f172a;
        }

        .controls {
            margin-top: 15px;
        }

        #tree {
            margin-top: 50px;
            position: relative;
            height: 420px;
        }

        .node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #0f172a;
            border: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            transform: translate(-50%, -50%);
            transition: 0.3s;
        }

        .active {
            background: #f59e0b;
            color: black;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .sorted {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sorted .node {
            position: static;
            transform: none;
            background: #022c22;
            border: 1px solid #10b981;
            color: #6ee7b7;
        }

        .estado {
            margin-top: 15px;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🌲 TreeSort Visual</h1>

    <div>
        <input id="input" placeholder="6,3,8,1,5,9,2,7">
        <button class="btn" onclick="cargar()">Cargar datos</button>
    </div>

    <div style="margin-top:12px; display:flex; justify-content:center; gap:10px; align-items:center; flex-wrap:wrap;">
        <!-- CSV upload -->
        <input type="file" id="fileInput" accept=".csv,.txt" style="background:#020617; color:white; border-radius:10px; padding:6px;" />
        <button class="btn" onclick="cargarDesdeArchivo()">📁 Cargar CSV/TXT</button>

        <!-- Random generator -->
        <input id="randomCount" type="number" min="1" max="1000" placeholder="10" style="width:90px; padding:8px; background:#020617; color:white; border:1px solid #1e293b; border-radius:10px;" />
        <button class="btn" onclick="generarAleatorio()">🎲 Generar aleatorio</button>
        <button class="btn" onclick="location.href='/bubble'">
            🫧 BubbleSort
        </button>
        <button class="btn" onclick="location.href='/bucket'">
            🪣 BucketSort
        </button>
    </div>

    <div class="controls">
        <button class="btn" onclick="prevStep()">⬅ Paso anterior</button>
        <button class="btn" onclick="nextStep()">➡ Paso siguiente</button>
        <button class="btn" onclick="play()">▶ Reproducir</button>
        <button class="btn" onclick="pause()">⏸ Pausar</button>
        <button class="btn" onclick="goExplain()">📘 Explicación (Arreglo)</button>
        <button class="btn" onclick="goBenchmark()">📊 Benchmark</button>
    </div>

    <div id="estado" class="estado">Esperando datos...</div>

    <div id="tree"></div>

    <div id="sorted" class="sorted"></div>

</div>

<script>
    let steps = [];
    let current = 0;
    let playing = false;
    let interval = null;

    async function cargar() {
        const input = document.getElementById("input").value;

        const arr = input.split(/[\s,]+/)
            .map(n => parseInt(n))
            .filter(n => !isNaN(n));

        const res = await fetch("/api/treesort/steps", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(arr)
        });

        steps = await res.json();
        current = 0;
        render();
    }

    // Cargar y parsear archivo CSV o TXT del cliente. Extrae números y los coloca en el campo de entrada
    function cargarDesdeArchivo() {
        const fi = document.getElementById('fileInput');
        if (!fi.files || fi.files.length === 0) {
            alert('Por favor selecciona un archivo CSV o TXT.');
            return;
        }
        const f = fi.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            // Extraer números separados por comas, espacios o nuevas líneas
            const arr = text.split(/[^0-9-]+/).map(s => parseInt(s)).filter(n => !isNaN(n));
            if (!arr.length) {
                alert('No se encontraron números en el archivo.');
                return;
            }
            document.getElementById('input').value = arr.join(',');
            cargar();
        };
        reader.onerror = function() { alert('Error leyendo el archivo.'); };
        reader.readAsText(f);
    }

    // Genera n números aleatorios (por defecto 10) en rango 0..1000 y carga la vista
    function generarAleatorio() {
        let count = parseInt(document.getElementById('randomCount').value);
        if (isNaN(count) || count <= 0) count = 10;
        if (count > 1000) { alert('Máximo permitido: 1000 elementos.'); count = 1000; }

        const arr = [];
        for (let i = 0; i < count; i++) {
            // números razonables hasta 1000
            arr.push(Math.floor(Math.random() * 1001));
        }
        document.getElementById('input').value = arr.join(',');
        cargar();
    }

    function render() {
        if (!steps.length) return;

        const step = steps[current];

        renderTree(step.tree, step.value);
        renderSorted(step.sorted);

        document.getElementById("estado").innerText =
            `${step.type.toUpperCase()} ${step.value ?? ''} | Paso ${current + 1}/${steps.length}`;
    }

    function nextStep() {
        if (current < steps.length - 1) {
            current++;
            render();
        }
    }

    function prevStep() {
        if (current > 0) {
            current--;
            render();
        }
    }

    function play() {
        if (playing) return;
        playing = true;

        interval = setInterval(() => {
            if (current >= steps.length - 1) {
                pause();
                return;
            }
            current++;
            render();
        }, 600);
    }

    function pause() {
        playing = false;
        clearInterval(interval);
    }

    function renderTree(root, active) {
        const cont = document.getElementById("tree");

        if (!root) {
            cont.innerHTML = "<p style='color:#555'>Árbol vacío</p>";
            return;
        }

        const positions = [];
        const width = cont.clientWidth;
        const levelHeight = 80;

        function traverse(node, depth, xMin, xMax) {
            if (!node) return;

            const x = (xMin + xMax) / 2;
            const y = depth * levelHeight + 40;

            positions.push({ node, x, y });

            traverse(node.left, depth + 1, xMin, x);
            traverse(node.right, depth + 1, x, xMax);
        }

        traverse(root, 0, 0, width);

        let html = "";

        positions.forEach(p => {
            html += `
                <div class="node ${p.node.value === active ? 'active' : ''}"
                     style="left:${p.x}px; top:${p.y}px;">
                    ${p.node.value}
                </div>
            `;
        });

        cont.innerHTML = html;
    }

    function renderSorted(arr) {
        document.getElementById("sorted").innerHTML =
            arr.map(n => `<div class="node">${n}</div>`).join("");
    }

    document.getElementById("input").value = "6,3,8,1,5,9,2,7";

    function goExplain() {
        const input = document.getElementById('input').value || '';
        const qs = encodeURIComponent(input);
        location.href = '/tree-explain?input=' + qs;
    }

    function goBenchmark() {
        const input = document.getElementById('input').value || '';
        const qs = encodeURIComponent(input);
        // navigate to benchmark page and pass input as query param (manual mode can use it)
        location.href = '/benchmark?input=' + qs;
    }
</script>

</body>
</html>
